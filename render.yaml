
services:
  - type: web
    name: pharma-webcast
    env: php
    plan: starter
    rootDir: .
    buildCommand: ""
    startCommand: ""
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_HOST
        fromDatabase:
          name: pharma-webcast-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: pharma-webcast-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: pharma-webcast-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: pharma-webcast-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: pharma-webcast-db
          property: password
    disk:
      name: storage
      mountPath: /opt/render/project/src/storage
      sizeGB: 1

databases:
  - name: pharma-webcast-db
    databaseName: pharma_webcast
    user: pharma_webcast
    plan: starter
